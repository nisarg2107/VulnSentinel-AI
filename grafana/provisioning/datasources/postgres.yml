apiVersion: 1

datasources:
  - name: VulnSentinel Postgres
    uid: vulnsentinel-postgres
    type: postgres
    access: proxy
    url: host.docker.internal:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      maxOpenConns: 100
      maxIdleConns: 100
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
    editable: true
